<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Sunrise Grill & BBQ</title>
    <script>
      // Undo the public/404.html redirect so a direct hit, refresh, or shared
      // link to a route like /menu renders that route instead of the
      // query-string bounce GitHub Pages sent it through.
      (function (l) {
        if (l.search.slice(0, 4) !== '?p=/') return;
        var rest = l.search.slice(3);
        var qIndex = rest.indexOf('&q=');
        var path = (qIndex === -1 ? rest : rest.slice(0, qIndex)).replace(/~and~/g, '&');
        var query = qIndex === -1 ? '' : '?' + rest.slice(qIndex + 3).replace(/~and~/g, '&');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + path + query + l.hash);
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

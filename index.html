<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Sunrise Grill & BBQ</title>
    <script>
      // Undo the public/404.html redirect so a direct hit, refresh, or shared
      // link to a route like /menu renders that route instead of the
      // query-string bounce GitHub Pages sent it through.
      (function (l) {
        if (l.search[1] === 'p' && l.search.indexOf('/', 2) === 2) {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
